version: "1.0"

# A prior-auth agent's guardrails. The Vercel integration reads this spec:
#  - `requires` / `max_ref` enforce ordering and bound the billed amount,
#  - `requires_approval` routes submit_prior_auth through gate() for human approval.
tools:
  lookup_auth:
    # read-only, always allowed

  submit_prior_auth:
    # must look the authorization up first, and the billed amount can't exceed the authorized amount
    requires: [lookup_auth]
    requires_approval: true
    input:
      properties:
        billed_amount:
          max_ref: lookup_auth.output.authorized_amount
          action: block

  notify_payer:
    input:
      properties:
        to:
          # never notify a competitor domain
          blocked_patterns: ["*@competitor.com"]
          action: block

breakers:
  loop:
    max_identical_calls: 3
    action: block
